name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run validate:drift
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test -- --coverage
